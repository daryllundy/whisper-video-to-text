name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv run pip install -e ".[dev]"

      - name: Verify tests directory
        run: test -d tests

      - name: Run tests
        run: uv run pytest -v --tb=short --durations=10

      - name: Run lint checks
        run: |
          uv run ruff check .
          uv run black --check .

      - name: Test CLI help
        run: |
          timeout 30 uv run whisper_video_to_text --help
          timeout 30 uv run python -m whisper_video_to_text --help

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t whisper-video-to-text:ci .

      - name: Validate Docker image
        run: |
          timeout 30 docker run --rm whisper-video-to-text:ci --help
          timeout 30 docker run --rm --entrypoint="" whisper-video-to-text:ci python -c "import whisper_video_to_text"
          timeout 30 docker run --rm --entrypoint="" whisper-video-to-text:ci ffmpeg -version
