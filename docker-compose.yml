services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_REVISION: ${APP_REVISION:-local}
    image: whisper-video-to-text:latest
    container_name: whisper-web
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - transcripts:/app/transcripts
      - uploads:/app/uploads
      - whisper-cache:/home/appuser/.cache/whisper
      - yt-dlp-cache:/home/appuser/.cache/yt-dlp
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - PORT=${PORT:-8000}
      - HOST=${HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          from whisper_video_to_text.convert import SUPPORTED_MEDIA_EXTENSIONS
          assert ".m4a" in SUPPORTED_MEDIA_EXTENSIONS
          body = urllib.request.urlopen("http://localhost:8000/", timeout=5).read().decode("utf-8")
          assert 'id="drop-zone"' in body
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["uvicorn", "whisper_video_to_text.web.main:app", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  transcripts:
    driver: local
  uploads:
    driver: local
  whisper-cache:
    driver: local
  yt-dlp-cache:
    driver: local

networks:
  default:
    name: whisper-network
